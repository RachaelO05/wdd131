<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 – Dynamic Web Fundamentals – Rachael O'Moore</title>
    <meta name="author" content="Rachael O'Moore">
    <meta name="description" content="Rachael O'Moore, WDD131 – Dynamic Web Fundamentals, My form page according to course">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400&family=Michroma&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <label for="productName">Product Name*</label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset class="rating">
                <legend>Overall Rating*</legend>

                <div>
                    <label for="rating1">☆</label>
                    <input type="radio" id="rating1" name="rating" value="1" required>
                </div>
                
                <div>
                    <label for="rating2">☆☆</label>
                    <input type="radio" id="rating2" name="rating" value="2">
                </div>
                
                <div>
                    <label for="rating3">☆☆☆</label>
                    <input type="radio" id="rating3" name="rating" value="3">
                </div>
        
                <div>
                    <label for="rating4">☆☆☆☆</label>
                    <input type="radio" id="rating4" name="rating" value="4">
                </div>
                
                <div>
                    <label for="rating5">☆☆☆☆☆</label>
                    <input type="radio" id="rating5" name="rating" value="5">
                </div>
            </fieldset>
            
            <label>Date of Installation*</label>
            <input type="date" id="installationDate" name="installationDate" required>
        
            <fieldset class="features">
                <legend>Which of the features did you find useful in this product?</legend>
                <p>(Select all that apply)</p>

                <label for="durability">Durability</label>
                <input type="checkbox" id="durability" name="features" value="Durability">

                <label for="easeOfuse">Ease of use</label>
                <input type="checkbox" id="easeOfuse" name="features" value="Ease of use">

                <label for="performance">Performance</label>
                <input type="checkbox" id="performance" name="features" value="Performance">

                <label for="design">Design</label>
                <input type="checkbox" id="design" name="features" value="Design">
            </fieldset>

            <label for="writtenReview">Written review (optional)</label>
            <textarea id="writtenReview" name="writtenReview"></textarea>

            <label for="userName">Your Name: (optional)</label>
            <input type="text" id="userName" name="userName">

            <input type="submit" value="Post Product Review">
            
        </form>
    </main>
    <footer>
        <p>©<span id="currentyear"></span> ☘️ Rachael O'Moore ☘️ South Africa</p>
        <p id="lastModified"></p>
    </footer>
    
</body>
</html>
